version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bookmark-postgres
    environment:
      POSTGRES_DB: bookmarks
      POSTGRES_USER: bookmarks_user
      POSTGRES_PASSWORD: bookmarks_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookmarks_user -d bookmarks"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookmark-network

  qwen-code-api:
    build:
      context: ./qwen-code-api
      args:
        REGISTRY_PREFIX_DOCKER_HUB: ${REGISTRY_PREFIX_DOCKER_HUB:-}
    container_name: bookmark-qwen-code-api
    restart: unless-stopped
    ports:
      - "${QWEN_CODE_API_HOST_ADDRESS:-127.0.0.1}:${QWEN_CODE_API_HOST_PORT:-8080}:${QWEN_CODE_API_CONTAINER_PORT:-8080}"
    volumes:
      - ~/.qwen:/mnt/qwen-creds:ro
    environment:
      - PORT=${QWEN_CODE_API_CONTAINER_PORT:-8080}
      - ADDRESS=${QWEN_CODE_API_CONTAINER_ADDRESS:-0.0.0.0}
      - DEFAULT_MODEL=${QWEN_CODE_API_MODEL:-qwen-plus}
      - LOG_LEVEL=${QWEN_CODE_API_LOG_LEVEL:-error}
      - MAX_RETRIES=${QWEN_CODE_API_MAX_RETRIES:-5}
      - RETRY_DELAY_MS=${QWEN_CODE_API_RETRY_DELAY_MS:-1000}
      - QWEN_CODE_AUTH_USE=${QWEN_CODE_API_AUTH_USE:-true}
      - LOG_REQUESTS=${QWEN_CODE_API_LOG_REQUESTS:-true}
      - QWEN_CODE_API_KEY=${QWEN_CODE_API_KEY:-}
    networks:
      - bookmark-network
    healthcheck:
      test:
        - CMD
        - python
        - "-c"
        - |
          import urllib.request
          req = urllib.request.Request(
              'http://localhost:${QWEN_CODE_API_CONTAINER_PORT:-8080}/health',
              headers={'X-API-Key': '${QWEN_CODE_API_KEY:-}'}
          )
          urllib.request.urlopen(req)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookmark-backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: bookmarks
      POSTGRES_USER: bookmarks_user
      POSTGRES_PASSWORD: bookmarks_pass
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-super-secret-jwt-key-change-in-production}
      # Backend talks to qwen-code-api via its OpenAI-compatible endpoint
      LLM_API_BASE_URL: http://qwen-code-api:${QWEN_CODE_API_CONTAINER_PORT:-8080}/v1
      LLM_API_KEY: ${QWEN_CODE_API_KEY:-}
      LLM_MODEL: ${QWEN_CODE_API_MODEL:-qwen-plus}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:80}
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qwen-code-api:
        condition: service_started
    networks:
      - bookmark-network

  frontend:
    build:
      context: ./client-web-react
      dockerfile: Dockerfile
    container_name: bookmark-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - bookmark-network

volumes:
  postgres_data:

networks:
  bookmark-network:
    driver: bridge
